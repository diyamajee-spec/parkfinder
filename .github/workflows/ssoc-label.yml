name: Add SSoC26 Label

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  add-label:
    runs-on: ubuntu-latest

    steps:
      - name: Add SSoC26 label
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: SSoC26
          github_token: ${{ secrets.GITHUB_TOKEN }}
